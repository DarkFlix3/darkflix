<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Checkered pattern -->
    <pattern id="checkers" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#0c0c0c"/>
      <rect x="32" width="32" height="32" fill="#11794b"/>
      <rect y="32" width="32" height="32" fill="#11794b"/>
      <rect x="32" y="32" width="32" height="32" fill="#0c0c0c"/>
    </pattern>
  </defs>
  <!-- Outer black background -->
  <rect width="512" height="512" fill="#000000"/>
  <!-- Inner rounded frame with checkered background -->
  <rect x="24" y="24" width="464" height="464" rx="48" fill="url(#checkers)" stroke="#0df27b" stroke-width="6" filter="drop-shadow(0px 0px 12px rgba(13,242,123,0.4))"/>
  
  <!-- Silhouette / Minimalist Tanjirou elements -->
  <!-- Hair: Spiky silhouette dark burgundy/red-brown -->
  <path d="M 256,120 C 200,120 160,160 160,220 C 160,240 170,270 180,290 L 150,300 C 170,330 200,340 220,340 L 210,360 L 230,360 L 240,400 L 272,400 L 282,360 L 302,360 L 292,340 C 312,340 342,330 362,300 L 332,290 C 342,270 352,240 352,220 C 352,160 312,120 256,120 Z" fill="#2d1518" stroke="#7a1f29" stroke-width="4"/>
  
  <!-- Face/Skin tone -->
  <path d="M 200,240 C 200,200 312,200 312,240 C 312,290 290,340 256,340 C 222,340 200,290 200,240 Z" fill="#fce4d6"/>
  
  <!-- Spiky hair overlay to make it look detailed -->
  <path d="M 180,180 L 220,150 L 210,200 L 250,140 L 240,210 L 272,210 L 262,140 L 302,200 L 292,150 L 332,180 L 312,220 L 342,230 L 302,260 L 322,280 L 282,290 L 272,330 L 256,300 L 240,330 L 230,290 L 190,280 L 210,260 L 170,230 L 200,220 Z" fill="#2d1518" stroke="#7a1f29" stroke-width="2"/>
  
  <!-- Red scar on top left of head -->
  <path d="M 215,215 C 210,210 205,215 208,222 C 210,225 218,220 220,225 C 222,228 220,232 225,230 C 230,225 220,215 215,215 Z" fill="#932b35"/>
  
  <!-- Hanafuda Earring -->
  <g transform="translate(305, 290) scale(0.65)">
    <!-- White rectangle earring -->
    <rect x="-15" y="0" width="30" height="60" rx="3" fill="#ffffff" stroke="#000000" stroke-width="2"/>
    <!-- Red circle sun on earring -->
    <circle cx="0" cy="18" r="8" fill="#ff2a2a"/>
    <!-- Black ray lines -->
    <line x1="-15" y1="60" x2="0" y2="35" stroke="#000000" stroke-width="2"/>
    <line x1="15" y1="60" x2="0" y2="35" stroke="#000000" stroke-width="2"/>
    <line x1="0" y1="60" x2="0" y2="35" stroke="#000000" stroke-width="2"/>
  </g>
</svg>
